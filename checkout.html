<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>تکمیل سفارش | ELEMENTAL</title><link rel="stylesheet" href="css/style.css"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"></head><body><header class="header"><div class="logo"><img src="images/logo.png" alt="ELEMENTAL"></div><nav class="menu"><a href="index.html">خانه</a><a href="shop.html">فروشگاه</a><a href="cart.html">سبد خرید</a></nav></header><section class="checkout-page"><div class="section-title"><h2>تکمیل سفارش</h2></div><div class="checkout-container"><form id="checkoutForm" class="checkout-form"><h3>اطلاعات مشتری</h3><label>نام و نام خانوادگی</label><input id="customerName" required><label>شماره موبایل</label><input id="customerPhone" required><label>استان</label><input id="customerProvince" required><label>شهر</label><input id="customerCity" required><label>آدرس کامل</label><textarea id="customerAddress" required></textarea><label>کد پستی</label><input id="customerPostalCode" required><label>توضیحات سفارش</label><textarea id="customerNote"></textarea><button class="btn-primary" type="submit">ثبت سفارش</button></form><aside class="checkout-summary"><h3>خلاصه سفارش</h3><div id="checkoutItems"></div><div class="summary-row"><span>جمع کالاها</span><span id="checkoutSubtotal">0 تومان</span></div><div class="summary-row"><span>هزینه ارسال</span><span>رایگان</span></div><div class="summary-row"><strong>مبلغ نهایی</strong><strong id="checkoutTotal">0 تومان</strong></div><h4>روش پرداخت</h4><p>پرداخت آنلاین (به‌زودی)</p></aside></div></section><script src="js/checkout.js"></script></body></html>
